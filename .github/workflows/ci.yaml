name: ci
on:
  push:
    branches: [ main ]
    tags: [ '*' ]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
          check-latest: true
          cache: ${{ github.event_name != 'push' }} # zizmor: ignore[cache-poisoning] Zizmor doesn't understand that this disables caching for release builds
      - run: make check-vendor
      - run: make rollout-operator

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
          check-latest: true
          cache: ${{ github.event_name != 'push' }} # zizmor: ignore[cache-poisoning] Zizmor doesn't understand that this disables caching for release builds
      - run: make check-vendor
      - run: make test
      - run: make test-boringcrypto

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
          check-latest: true
          cache: ${{ github.event_name != 'push' }} # zizmor: ignore[cache-poisoning] Zizmor doesn't understand that this disables caching for release builds
      - name: Install kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          install_only: true
      - name: Install jsonnet
        run: |
          set -euo pipefail
          JSONNET_VERSION="0.21.0"
          asset="go-jsonnet_Linux_x86_64.tar.gz"
          tmp="$(mktemp -d)"
          curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors -o "${tmp}/checksums.txt" "https://github.com/google/go-jsonnet/releases/download/v${JSONNET_VERSION}/checksums.txt"
          curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors -o "${tmp}/${asset}" "https://github.com/google/go-jsonnet/releases/download/v${JSONNET_VERSION}/${asset}"
          expected="$(grep " ${asset}\$" "${tmp}/checksums.txt" || true)"
          [ -n "${expected}" ] || { echo "checksum entry for ${asset} not found in manifest" >&2; exit 1; }
          (cd "${tmp}" && echo "${expected}" | sha256sum -c -)
          sudo tar -xzf "${tmp}/${asset}" -C /usr/local/bin
      - name: Install tk
        run: |
          set -euo pipefail
          TANKA_VERSION="0.34.1"
          # Upstream does not publish a checksum manifest; verify against pinned hash.
          # On version bumps, recompute via: curl -sL <url> | sha256sum
          TANKA_SHA256="dd4bdf619b4e1fc61172c390b12f6a7503d9e936b957d69c8bcebbf7285e299c"
          sudo curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors -o /usr/local/bin/tk "https://github.com/grafana/tanka/releases/download/v${TANKA_VERSION}/tk-linux-amd64"
          echo "${TANKA_SHA256}  /usr/local/bin/tk" | sha256sum -c -
          sudo chmod a+x /usr/local/bin/tk
      - name: Install jb
        run: |
          set -euo pipefail
          JSONNET_BUNDLER_VERSION="0.6.0"
          # Upstream does not publish a checksum manifest; verify against pinned hash.
          # On version bumps, recompute via: curl -sL <url> | sha256sum
          JSONNET_BUNDLER_SHA256="78e54afbbc3ff3e0942b1576b4992277df4f6beb64cddd58528a76f0cd70db54"
          sudo curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors -o /usr/local/bin/jb "https://github.com/jsonnet-bundler/jsonnet-bundler/releases/download/v${JSONNET_BUNDLER_VERSION}/jb-linux-amd64"
          echo "${JSONNET_BUNDLER_SHA256}  /usr/local/bin/jb" | sha256sum -c -
          sudo chmod a+x /usr/local/bin/jb
      - run: make build-image
      - run: make integration

  integration-boringcrypto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
          check-latest: true
          cache: ${{ github.event_name != 'push' }} # zizmor: ignore[cache-poisoning] Zizmor doesn't understand that this disables caching for release builds
      - name: Install kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          install_only: true
      - name: Install jsonnet
        run: |
          set -euo pipefail
          JSONNET_VERSION="0.21.0"
          asset="go-jsonnet_Linux_x86_64.tar.gz"
          tmp="$(mktemp -d)"
          curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors -o "${tmp}/checksums.txt" "https://github.com/google/go-jsonnet/releases/download/v${JSONNET_VERSION}/checksums.txt"
          curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors -o "${tmp}/${asset}" "https://github.com/google/go-jsonnet/releases/download/v${JSONNET_VERSION}/${asset}"
          expected="$(grep " ${asset}\$" "${tmp}/checksums.txt" || true)"
          [ -n "${expected}" ] || { echo "checksum entry for ${asset} not found in manifest" >&2; exit 1; }
          (cd "${tmp}" && echo "${expected}" | sha256sum -c -)
          sudo tar -xzf "${tmp}/${asset}" -C /usr/local/bin
      - name: Install tk
        run: |
          set -euo pipefail
          TANKA_VERSION="0.34.1"
          # Upstream does not publish a checksum manifest; verify against pinned hash.
          # On version bumps, recompute via: curl -sL <url> | sha256sum
          TANKA_SHA256="dd4bdf619b4e1fc61172c390b12f6a7503d9e936b957d69c8bcebbf7285e299c"
          sudo curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors -o /usr/local/bin/tk "https://github.com/grafana/tanka/releases/download/v${TANKA_VERSION}/tk-linux-amd64"
          echo "${TANKA_SHA256}  /usr/local/bin/tk" | sha256sum -c -
          sudo chmod a+x /usr/local/bin/tk
      - name: Install jb
        run: |
          set -euo pipefail
          JSONNET_BUNDLER_VERSION="0.6.0"
          # Upstream does not publish a checksum manifest; verify against pinned hash.
          # On version bumps, recompute via: curl -sL <url> | sha256sum
          JSONNET_BUNDLER_SHA256="78e54afbbc3ff3e0942b1576b4992277df4f6beb64cddd58528a76f0cd70db54"
          sudo curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors -o /usr/local/bin/jb "https://github.com/jsonnet-bundler/jsonnet-bundler/releases/download/v${JSONNET_BUNDLER_VERSION}/jb-linux-amd64"
          echo "${JSONNET_BUNDLER_SHA256}  /usr/local/bin/jb" | sha256sum -c -
          sudo chmod a+x /usr/local/bin/jb
      - run: make build-image-boringcrypto
      - run: make integration

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
          check-latest: true
          cache: ${{ github.event_name != 'push' }} # zizmor: ignore[cache-poisoning] Zizmor doesn't understand that this disables caching for release builds
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.12.2
          args: --timeout=5m

  lint-jsonnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
          check-latest: true
          cache: ${{ github.event_name != 'push' }} # zizmor: ignore[cache-poisoning] Zizmor doesn't understand that this disables caching for release builds
      - name: Install jsonnet
        run: |
          set -euo pipefail
          JSONNET_VERSION="0.21.0"
          asset="go-jsonnet_Linux_x86_64.tar.gz"
          tmp="$(mktemp -d)"
          curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors -o "${tmp}/checksums.txt" "https://github.com/google/go-jsonnet/releases/download/v${JSONNET_VERSION}/checksums.txt"
          curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors -o "${tmp}/${asset}" "https://github.com/google/go-jsonnet/releases/download/v${JSONNET_VERSION}/${asset}"
          expected="$(grep " ${asset}\$" "${tmp}/checksums.txt" || true)"
          [ -n "${expected}" ] || { echo "checksum entry for ${asset} not found in manifest" >&2; exit 1; }
          (cd "${tmp}" && echo "${expected}" | sha256sum -c -)
          sudo tar -xzf "${tmp}/${asset}" -C /usr/local/bin
      - name: Install conftest
        run: |
          set -euo pipefail
          CONFTEST_VERSION="0.62.0"
          asset="conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          tmp="$(mktemp -d)"
          curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors -o "${tmp}/checksums.txt" "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/checksums.txt"
          curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors -o "${tmp}/${asset}" "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/${asset}"
          expected="$(grep " ${asset}\$" "${tmp}/checksums.txt" || true)"
          [ -n "${expected}" ] || { echo "checksum entry for ${asset} not found in manifest" >&2; exit 1; }
          (cd "${tmp}" && echo "${expected}" | sha256sum -c -)
          sudo tar -xzf "${tmp}/${asset}" -C /usr/local/bin conftest
      - name: Install tk
        run: |
          set -euo pipefail
          TANKA_VERSION="0.34.1"
          # Upstream does not publish a checksum manifest; verify against pinned hash.
          # On version bumps, recompute via: curl -sL <url> | sha256sum
          TANKA_SHA256="dd4bdf619b4e1fc61172c390b12f6a7503d9e936b957d69c8bcebbf7285e299c"
          sudo curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors -o /usr/local/bin/tk "https://github.com/grafana/tanka/releases/download/v${TANKA_VERSION}/tk-linux-amd64"
          echo "${TANKA_SHA256}  /usr/local/bin/tk" | sha256sum -c -
          sudo chmod a+x /usr/local/bin/tk
      - name: Install jb
        run: |
          set -euo pipefail
          JSONNET_BUNDLER_VERSION="0.6.0"
          # Upstream does not publish a checksum manifest; verify against pinned hash.
          # On version bumps, recompute via: curl -sL <url> | sha256sum
          JSONNET_BUNDLER_SHA256="78e54afbbc3ff3e0942b1576b4992277df4f6beb64cddd58528a76f0cd70db54"
          sudo curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors -o /usr/local/bin/jb "https://github.com/jsonnet-bundler/jsonnet-bundler/releases/download/v${JSONNET_BUNDLER_VERSION}/jb-linux-amd64"
          echo "${JSONNET_BUNDLER_SHA256}  /usr/local/bin/jb" | sha256sum -c -
          sudo chmod a+x /usr/local/bin/jb
      - name: Install mixtool
        run: |
          go install github.com/monitoring-mixins/mixtool/cmd/mixtool@main
      - name: Check Jsonnet Manifests
        run: make check-jsonnet-manifests
      - name: Check Jsonnet Tests
        run: make check-jsonnet-tests
      - name: Check Dashboard Mixin
        run: make check-mixin

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
          check-latest: true
          cache: ${{ github.event_name != 'push' }} # zizmor: ignore[cache-poisoning] Zizmor doesn't understand that this disables caching for release builds
      - name: Install misspell
        run: |
          set -euo pipefail
          MISSPELL_VERSION="0.3.4"
          asset="misspell_${MISSPELL_VERSION}_linux_64bit.tar.gz"
          tmp="$(mktemp -d)"
          curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors -o "${tmp}/checksums.txt" "https://github.com/client9/misspell/releases/download/v${MISSPELL_VERSION}/misspell_${MISSPELL_VERSION}_checksums.txt"
          curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors -o "${tmp}/${asset}" "https://github.com/client9/misspell/releases/download/v${MISSPELL_VERSION}/${asset}"
          expected="$(grep " ${asset}\$" "${tmp}/checksums.txt" || true)"
          [ -n "${expected}" ] || { echo "checksum entry for ${asset} not found in manifest" >&2; exit 1; }
          (cd "${tmp}" && echo "${expected}" | sha256sum -c -)
          sudo tar -xzf "${tmp}/${asset}" -C /usr/local/bin misspell
      - name: Install prettier
        run: |
          set -euo pipefail
          PRETTIER_VERSION="3.8.3"
          sudo npm install --global --ignore-scripts --no-audit --no-fund "prettier@${PRETTIER_VERSION}"
      - name: Check doc lint
        run: make doc-lint
      - name: Check doc
        run: make check-doc

  push-image:
    runs-on: ubuntu-latest
    needs:
      - build
      - test
      - integration
      - integration-boringcrypto
      - lint
      - lint-jsonnet
    if: github.event_name == 'push' # We want this job to run for both pushes to main, as well as new tags
    permissions:
      contents: write # Needed to be able to create releases.
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
          check-latest: true
          cache: false
      - name: Log in to Docker Hub
        uses: grafana/shared-workflows/actions/dockerhub-login@ef3a62a3ca4c1a15505b4235a5a51493194da3c7 # dockerhub-login/v1.0.4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Generate image tag
        id: image_tag
        run: |
          if [[ "$REF_TYPE" == "tag" ]]; then
            echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "tag=main-$SHA" >> "$GITHUB_OUTPUT"
          fi
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
      - name: Build and push image
        run: |
          if [[ "$REF_TYPE" == "tag" ]]; then
            make publish-images
          else
            make publish-standard-image
          fi
        env:
          REF_TYPE: ${{ github.ref_type }}
          IMAGE_TAG: ${{ steps.image_tag.outputs.tag }}
      - name: Publish release
        if: github.ref_type == 'tag'
        run: make release-notes | gh release create "$IMAGE_TAG" --notes-file -
        env:
          IMAGE_TAG: ${{ steps.image_tag.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
