apiVersion: v1
kind: ServiceAccount
metadata:
  name: rollout-operator
  namespace: default
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: replicatemplates.rollout-operator.grafana.com
spec:
  group: rollout-operator.grafana.com
  names:
    categories:
    - all
    kind: ReplicaTemplate
    plural: replicatemplates
    singular: replicatemplate
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Status replicas
      jsonPath: .status.replicas
      name: StatusReplicas
      type: string
    - description: Spec replicas
      jsonPath: .spec.replicas
      name: SpecReplicas
      type: string
    name: v1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              labelSelector:
                type: string
              replicas:
                default: 1
                minimum: 0
                type: integer
            type: object
          status:
            properties:
              replicas:
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      scale:
        labelSelectorPath: .spec.labelSelector
        specReplicasPath: .spec.replicas
        statusReplicasPath: .status.replicas
      status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: rollouthealthchecks.rollout-operator.grafana.com
spec:
  group: rollout-operator.grafana.com
  names:
    kind: RolloutHealthCheck
    plural: rollouthealthchecks
    shortNames:
    - rhc
    singular: rollouthealthcheck
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              checks:
                description: Ordered list of PromQL health checks evaluated before
                  progressing to the next zone.
                items:
                  properties:
                    baselineRange:
                      description: Range vector duration substituted for ${range}
                        when evaluating stable pods at the pre-rollout timestamp.
                        Defaults to 10m.
                      type: string
                    currentRange:
                      description: Range vector duration substituted for ${range}
                        when evaluating candidate pods. Defaults to 5m.
                      type: string
                    disabled:
                      description: When true, this check is skipped while other checks
                        remain active.
                      type: boolean
                    name:
                      description: Unique name of this check within the RolloutHealthCheck.
                      minLength: 1
                      type: string
                    onFailure:
                      description: Behavior when the success query returns failure.
                        Defaults to Pause.
                      enum:
                      - Pause
                      - Warn
                      - Disabled
                      type: string
                    onNoData:
                      description: Behavior when a query returns no data. Defaults
                        to Pause.
                      enum:
                      - Pause
                      - Warn
                      - Disabled
                      type: string
                    query:
                      description: |
                        PromQL that must return exactly one scalar. Required placeholders: ${targetMatchers} and ${range}.
                      minLength: 1
                      type: string
                    queryRetries:
                      description: Number of retries after the first attempt. Defaults
                        to 3.
                      minimum: 0
                      type: integer
                    queryTimeout:
                      description: Per-query timeout. Defaults to 10s.
                      type: string
                    successQuery:
                      description: |
                        PromQL evaluated after substituting ${current} and ${baseline} scalars. Must return scalar 1 (pass) or 0 (fail).
                      minLength: 1
                      type: string
                  required:
                  - name
                  - query
                  - successQuery
                  type: object
                minItems: 1
                type: array
              prometheusURL:
                description: Base URL of the Prometheus HTTP API used to evaluate
                  checks.
                minLength: 1
                type: string
              selector:
                description: Selector preventing this policy from being attached to
                  an unrelated workload.
                properties:
                  matchLabels:
                    additionalProperties:
                      type: string
                    type: object
                required:
                - matchLabels
                type: object
            required:
            - selector
            - prometheusURL
            - checks
            type: object
        type: object
    served: true
    storage: true
---
