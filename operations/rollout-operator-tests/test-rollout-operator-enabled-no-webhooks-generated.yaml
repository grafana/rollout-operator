apiVersion: v1
kind: ServiceAccount
metadata:
  name: rollout-operator
  namespace: default
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: rollouthealthchecks.rollout-operator.grafana.com
spec:
  group: rollout-operator.grafana.com
  names:
    kind: RolloutHealthCheck
    plural: rollouthealthchecks
    shortNames:
    - rhc
    singular: rollouthealthcheck
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              checks:
                description: Ordered list of PromQL health checks evaluated before
                  progressing to the next zone.
                items:
                  properties:
                    baselineRange:
                      description: Range vector duration substituted for ${range}
                        when evaluating stable pods at the pre-rollout timestamp.
                        Defaults to 10m.
                      type: string
                    currentRange:
                      description: Range vector duration substituted for ${range}
                        when evaluating candidate pods. Defaults to 5m.
                      type: string
                    disabled:
                      description: When true, this check is skipped while other checks
                        remain active.
                      type: boolean
                    name:
                      description: Unique name of this check within the RolloutHealthCheck.
                      minLength: 1
                      type: string
                    onFailure:
                      description: Behavior when the success query returns failure.
                        Defaults to Pause.
                      enum:
                      - Pause
                      - Warn
                      - Disabled
                      type: string
                    onNoData:
                      description: Behavior when a query returns no data. Defaults
                        to Pause.
                      enum:
                      - Pause
                      - Warn
                      - Disabled
                      type: string
                    query:
                      description: |
                        PromQL that must return exactly one scalar. Required placeholders: ${targetMatchers} and ${range}.
                      minLength: 1
                      type: string
                    queryRetries:
                      description: Number of retries after the first attempt. Defaults
                        to 3.
                      minimum: 0
                      type: integer
                    queryTimeout:
                      description: Per-query timeout. Defaults to 10s.
                      type: string
                    successQuery:
                      description: |
                        PromQL evaluated after substituting ${current} and ${baseline} scalars. Must return scalar 1 (pass) or 0 (fail).
                      minLength: 1
                      type: string
                  required:
                  - name
                  - query
                  - successQuery
                  type: object
                minItems: 1
                type: array
              prometheusURL:
                description: Base URL of the Prometheus HTTP API used to evaluate
                  checks.
                minLength: 1
                type: string
              selector:
                description: Selector preventing this policy from being attached to
                  an unrelated workload.
                properties:
                  matchLabels:
                    additionalProperties:
                      type: string
                    type: object
                required:
                - matchLabels
                type: object
            required:
            - selector
            - prometheusURL
            - checks
            type: object
        type: object
    served: true
    storage: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rollout-operator-role
  namespace: default
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - list
  - get
  - watch
  - delete
  - patch
- apiGroups:
  - apps
  resources:
  - statefulsets
  verbs:
  - list
  - get
  - watch
  - patch
- apiGroups:
  - apps
  resources:
  - statefulsets/status
  verbs:
  - update
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - update
  - create
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - rollout-operator.grafana.com
  resources:
  - zoneawarepoddisruptionbudgets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - rollout-operator.grafana.com
  resources:
  - rollouthealthchecks
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rollout-operator-rolebinding
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rollout-operator-role
subjects:
- kind: ServiceAccount
  name: rollout-operator
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rollout-operator
  namespace: default
spec:
  minReadySeconds: 10
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      name: rollout-operator
  strategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        name: rollout-operator
    spec:
      containers:
      - args:
        - -kubernetes.namespace=default
        - -use-zone-tracker=true
        - -zone-tracker.config-map-name=rollout-operator-zone-tracker
        - -zpdb.pod-ready-annotation-patch-timeout=5s
        image: grafana/rollout-operator:v0.38.1
        imagePullPolicy: IfNotPresent
        name: rollout-operator
        ports:
        - containerPort: 8001
          name: http-metrics
        readinessProbe:
          httpGet:
            path: /ready
            port: 8001
          initialDelaySeconds: 5
          timeoutSeconds: 1
        resources:
          limits:
            memory: 200Mi
          requests:
            cpu: 100m
            memory: 100Mi
      serviceAccountName: rollout-operator
